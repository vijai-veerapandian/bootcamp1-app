apiVerision: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootcamp1-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/vijai-veerapandian/bootcamp1-app.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: bootcamp1-app
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ createNamespace=true ]
