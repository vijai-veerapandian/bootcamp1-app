# nginx config for the static frontend.
# - Serves the static page from /usr/share/nginx/html.
# - Reverse-proxies /api/* and /healthz to the backend Service (reachable at
#   http://backend:8000 via cluster/compose DNS), so the browser stays
#   same-origin and never deals with CORS.

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /healthz {
        proxy_pass http://backend:8000;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
