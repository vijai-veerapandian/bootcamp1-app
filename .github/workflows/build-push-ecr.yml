name: build-and-push-ecr
  on:
    push:
      branches: [ main ]          # adjust if your default branch differs
    workflow_dispatch:            # lets you run it manually from the Actions tab
    
  env:
    AWS_REGION: us-east-1

  jobs:
    build-push:
      runs-on: ubuntu-latest
      strategy:
        matrix:
          service: [ backend, frontend ]   # builds both, in parallel
      steps:
        - uses: actions/checkout@v4
        - name: Check secret is present
          run: |
            if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
              echo "AWS_ACCESS_KEY_ID secret is EMPTY/missing"; exit 1
            else
              echo "AWS_ACCESS_KEY_ID is set (len=${#key})"; 
            fi
          env:
            key: ${{ secrets.AWS_ACCESS_KEY_ID }}

        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@v4
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ${{ env.AWS_REGION }}
            
        - name: Login to Amazon ECR
    build-push:
      runs-on: ubuntu-latest
      strategy:
        matrix:
          service: [ backend, frontend ]   # builds both, in parallel
      steps:
        - uses: actions/checkout@v4

        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@v4
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ${{ env.AWS_REGION }}

        - name: Login to Amazon ECR
          id: ecr
          uses: aws-actions/amazon-ecr-login@v2

        - name: Build & push ${{ matrix.service }}
          env:
            REGISTRY: ${{ steps.ecr.outputs.registry }}
            REPO: bootcamp1-app-${{ matrix.service }}
            TAG: ${{ github.sha }}
          run: |
            docker build -t "$REGISTRY/$REPO:$TAG" -t "$REGISTRY/$REPO:latest" ./${{ matrix.service }}
            docker push "$REGISTRY/$REPO:$TAG"
            docker push "$REGISTRY/$REPO:latest"
