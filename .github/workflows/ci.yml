name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# OIDC: lets us assume an IAM role in AWS without long-lived secrets.
permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  ECR_NAMESPACE: bootcamp1-app

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r backend/requirements-dev.txt
      - run: pytest -q
        working-directory: backend

  # The frontend is a static site (no build step). Just sanity-check the image
  # builds so a broken Dockerfile fails CI before we try to publish.
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false

  # Only push images on main. Pull requests stop after the test/build jobs above.
  publish:
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push ${{ matrix.component }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_NAMESPACE }}/${{ matrix.component }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_NAMESPACE }}/${{ matrix.component }}:latest
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

  # GitOps handoff: after the images are pushed, pin the Helm values in the
  # infra repo to this commit's SHA so ArgoCD rolls out the new build. This is
  # the only place the app repo writes to the infra repo.
  #
  # Requires repo SECRET  GITOPS_TOKEN = a fine-grained PAT with
  # Contents: Read AND Write on vijai-veerapandian/bootcamp1-infra.
  update-gitops:
    needs: [publish]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      GITOPS_REPO: vijai-veerapandian/bootcamp-w2
      VALUES_PATH: helm/bootcamp1-app/values.yaml
    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Pin image tags to ${{ github.sha }}
        env:
          TAG: ${{ github.sha }}
        run: |
          # yq is pre-installed on ubuntu-latest. Set both image tags precisely.
          yq -i '.image.backend.tag = strenv(TAG) | .image.frontend.tag = strenv(TAG)' "$VALUES_PATH"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$VALUES_PATH"
          git commit -m "deploy: bootcamp1-app @ ${TAG}" || { echo "no change to commit"; exit 0; }
          git push
